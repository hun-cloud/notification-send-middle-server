version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: notification-relay-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: notification_relay
      MYSQL_USER: relay_user
      MYSQL_PASSWORD: relay_password
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    networks:
      - notification-network

  rabbitmq:
    image: rabbitmq:3.12-management
    command: >
      sh -c "rabbitmq-plugins enable rabbitmq_consistent_hash_exchange &&
             docker-entrypoint.sh rabbitmq-server"
    container_name: notification-relay-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit consumer_timeout 30000"
    ports:
      - "5672:5672"   # AMQP 포트
      - "15672:15672" # Management UI 포트
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - notification-network

  redis:
    image: redis:7.2
    container_name: notification-relay-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - notification-network

volumes:
  mysql_data:
    driver: local
  rabbitmq_data:
    driver: local
  redis_data:
    driver: local

networks:
  notification-network:
    driver: bridge