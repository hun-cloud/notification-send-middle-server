spring:
  application:
    name: notification-relay

  # Database 설정
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/notification_relay?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: relay_user
    password: relay_password

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: update  # 운영: validate, 개발: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        show_sql: false
    open-in-view: false

  # RabbitMQ 설정
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    publisher-confirms: true
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 3000
          max-attempts: 3
          multiplier: 2.0

# RabbitMQ 커스텀 설정
rabbitmq:
  notification:
    exchange: notification.exchange
    queue-count: 4
    routing-key:
      sms: notification.sms
      kakao: notification.kakao
      email: notification.email

# 로깅 설정
logging:
  level:
    com.notification.relay: INFO
    org.springframework.amqp: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# 서버 설정
server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# outbox 설정
outbox:
  publish:
    confirm-timeout-seconds: 5
    max-retry-count: 3

# snowflake 설정x
snowflake:
  worker-id: ${WORKER_ID:0}
  data-center-id: ${DATA_CENTER_ID:0}